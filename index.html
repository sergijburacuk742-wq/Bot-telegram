<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LION TRAFFIC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Базові налаштування кольорів (стилістика Telegram + Золото Лева) */
        :root {
            --bg-color: #131415;
            --text-color: #ffffff;
            --brand-color: #f39c12; /* Золотий/Оранжевий */
            --brand-gradient: linear-gradient(90deg, #f39c12, #f1c40f);
            --input-bg: rgba(255, 255, 255, 0.08);
            --hint-color: #8e8e93;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ЕКРАН ПРИВІТАННЯ --- */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            transition: opacity 0.4s ease-out;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 900;
            margin: 0;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 20px rgba(243, 156, 18, 0.2);
        }

        .sub-text {
            font-size: 16px;
            color: var(--hint-color);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }

        /* Анімована кнопка */
        .btn-animated {
            margin-top: 50px;
            padding: 18px 36px;
            font-size: 18px;
            font-weight: 700;
            color: #131415; /* Темний текст на світлій кнопці */
            background: var(--brand-gradient);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            animation: pulse 2s infinite; /* Додаємо анімацію пульсації */
            width: 85%;
            max-width: 320px;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 4px 25px rgba(243, 156, 18, 0.7); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); }
        }

        /* --- ЕКРАН АНКЕТИ --- */
        #form-screen {
            display: none; /* Приховано за замовчуванням */
            flex-direction: column;
            padding: 24px;
            height: 100%;
            overflow-y: auto;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--hint-color);
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, background-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brand-color);
            background-color: rgba(255, 255, 255, 0.12);
        }

        .btn-submit {
            margin-top: 10px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            color: #131415;
            background: var(--brand-gradient);
            border: none;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 30px; /* Відступ знизу, щоб було зручно скролити */
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div>
            <h1 class="logo-text">🦁 LION TRAFFIC</h1>
            <p class="sub-text">Набір у команду</p>
        </div>
        <button class="btn-animated" onclick="showForm()">Заповнити анкету</button>
    </div>

    <div id="form-screen">
        <div class="form-header">
            <h2>Анкета кандидата</h2>
        </div>

        <div class="form-group">
            <label>Чи є досвід в арбітражі?</label>
            <select id="exp">
                <option value="Так">✅ Так, маю досвід</option>
                <option value="Ні">❌ Ні, я новачок</option>
            </select>
        </div>

        <div class="form-group">
            <label>Скільки часу готовий приділяти?</label>
            <select id="time">
                <option value="1-3 години">1-3 години на день</option>
                <option value="3-6 годин">3-6 годин на день</option>
                <option value="Більше 6 годин">Більше 6 годин (Фултайм)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Скільки тобі років?</label>
            <input type="number" id="age" placeholder="Наприклад: 18">
        </div>

        <div class="form-group">
            <label>Чому саме арбітраж?</label>
            <textarea id="reason" rows="3" placeholder="Розкажи коротко про свої цілі..."></textarea>
        </div>

        <button class="btn-submit" onclick="sendData()">Відправити заявку</button>
    </div>

    <script>
        // Ініціалізуємо Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Відкриваємо на весь екран

        // Функція для переходу від привітання до анкети
        function showForm() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('form-screen').style.display = 'flex';
        }

        // Функція збору та відправки даних у бота
        function sendData() {
            let exp = document.getElementById("exp").value;
            let time = document.getElementById("time").value;
            let age = document.getElementById("age").value;
            let reason = document.getElementById("reason").value;

            // Перевірка, чи ввели вік
            if(!age) {
                tg.showAlert("⚠️ Будь ласка, вкажи свій вік!");
                return;
            }

            // Формуємо пакет даних
            let data = {
                exp: exp,
                time: time,
                age: age,
                reason: reason
            };

            // Відправляємо дані назад у Python
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
