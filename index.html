<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LION TRAFFIC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #131415;
            --text-color: #ffffff;
            --brand-color: #f39c12;
            --brand-gradient: linear-gradient(90deg, #f39c12, #f1c40f);
            --input-bg: rgba(255, 255, 255, 0.08);
            --hint-color: #8e8e93;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- ЕКРАН ПРИВІТАННЯ --- */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            transition: opacity 0.4s ease-out;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 900;
            margin: 0;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 20px rgba(243, 156, 18, 0.2);
        }

        .sub-text {
            font-size: 16px;
            color: var(--hint-color);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }

        .btn-animated {
            margin-top: 50px;
            padding: 18px 36px;
            font-size: 18px;
            font-weight: 700;
            color: #131415;
            background: var(--brand-gradient);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            animation: pulse 2s infinite;
            width: 85%;
            max-width: 320px;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 4px 25px rgba(243, 156, 18, 0.7); }
            100% { transform: scale(1); box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4); }
        }

        /* --- ПОКРОКОВІ ЕКРАНИ (КРОКИ) --- */
        .step {
            display: none; /* Всі кроки приховані за замовчуванням */
            flex-direction: column;
            padding: 30px 24px;
            height: 100%;
            box-sizing: border-box;
            animation: slideIn 0.4s ease-out;
        }

        /* Клас, який показує активний крок */
        .step.active {
            display: flex;
        }

        /* Анімація виїзду екрану з правого боку */
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .step-indicator {
            font-size: 14px;
            color: var(--brand-color);
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        label {
            display: block;
            font-size: 20px;
            color: var(--text-color);
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.4;
        }

        input, select, textarea {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 30px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--brand-color);
        }

        .btn-next {
            margin-top: auto; /* Притискає кнопку донизу екрану */
            margin-bottom: 20px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            color: #131415;
            background: var(--brand-gradient);
            border: none;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div>
            <h1 class="logo-text">🦁 LION TRAFFIC</h1>
            <p class="sub-text">Набір у команду</p>
        </div>
        <button class="btn-animated" onclick="startSurvey()">Заповнити анкету</button>
    </div>

    <div id="step-1" class="step">
        <div class="step-indicator">Питання 1 з 4</div>
        <label>Чи є у тебе досвід в арбітражі?</label>
        <select id="exp">
            <option value="Так">✅ Так, маю досвід</option>
            <option value="Ні">❌ Ні, я новачок</option>
        </select>
        <button class="btn-next" onclick="goToStep(1, 2)">Далі ➔</button>
    </div>

    <div id="step-2" class="step">
        <div class="step-indicator">Питання 2 з 4</div>
        <label>Скільки часу готовий приділяти роботі щодня?</label>
        <select id="time">
            <option value="1-3 години">1-3 години</option>
            <option value="3-6 годин">3-6 годин</option>
            <option value="Більше 6 годин">Більше 6 годин (Фултайм)</option>
        </select>
        <button class="btn-next" onclick="goToStep(2, 3)">Далі ➔</button>
    </div>

    <div id="step-3" class="step">
        <div class="step-indicator">Питання 3 з 4</div>
        <label>Скільки тобі повних років?</label>
        <input type="number" id="age" placeholder="Введи цифру (наприклад: 18)">
        <button class="btn-next" onclick="goToStep(3, 4)">Далі ➔</button>
    </div>

    <div id="step-4" class="step">
        <div class="step-indicator">Питання 4 з 4</div>
        <label>Чому саме арбітраж і які в тебе цілі?</label>
        <textarea id="reason" rows="4" placeholder="Напиши кілька слів про свою мотивацію..."></textarea>
        <button class="btn-next" style="background: #27ae60; color: white;" onclick="finishSurvey()">Відправити заявку ✔️</button>
    </div>

    <script>
        // Підключення до Telegram
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Ховаємо головний екран, показуємо перший крок
        function startSurvey() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('step-1').classList.add('active');
        }

        // Перемикання між кроками
        function goToStep(currentStep, nextStep) {
            // Валідація: якщо це крок з віком, перевіряємо чи ввели дані
            if (currentStep === 3) {
                let age = document.getElementById('age').value;
                if (!age) {
                    tg.showAlert("⚠️ Будь ласка, вкажи свій вік!");
                    return; // Зупиняємо перехід, поки не введе вік
                }
            }

            // Ховаємо поточний крок
            document.getElementById('step-' + currentStep).classList.remove('active');
            // Показуємо наступний крок
            document.getElementById('step-' + nextStep).classList.add('active');
        }

        // Завершення анкети і відправка даних
        function finishSurvey() {
            let reason = document.getElementById('reason').value;

            // Валідація тексту
            if (!reason.trim()) {
                tg.showAlert("⚠️ Будь ласка, напиши хоча б пару слів про свою мотивацію!");
                return;
            }

            // Збираємо всі відповіді з усіх кроків
            let data = {
                exp: document.getElementById("exp").value,
                time: document.getElementById("time").value,
                age: document.getElementById("age").value,
                reason: reason
            };

            // Відправляємо у твій Python-бот
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
